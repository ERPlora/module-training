{% load djicons i18n chooser %}
<div data-back-url="{% url 'training:employee_trainings_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Employeetraining" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'training:employee_trainings_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-employee_training-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-employee_training-form"
          hx-post="{% url 'training:employee_training_edit' obj.id %}"
          @chooser-change.window="if ($event.detail.name === 'employee_id') { $el.querySelector('[name=employee_name]').value = $event.detail.items.length ? $event.detail.items[0].label : '' }">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Employee" %}</label>
                {% chooser "accounts.localuser" name="employee_id" value=obj.employee_id %}
                <input type="hidden" name="employee_name" value="{{ obj.employee_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                    <option value="enrolled" {% if obj.status == "enrolled" %}selected{% endif %}>{% trans "Enrolled" %}</option>
                    <option value="in_progress" {% if obj.status == "in_progress" %}selected{% endif %}>{% trans "In Progress" %}</option>
                    <option value="completed" {% if obj.status == "completed" %}selected{% endif %}>{% trans "Completed" %}</option>
                    <option value="dropped" {% if obj.status == "dropped" %}selected{% endif %}>{% trans "Dropped" %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Start Date" %}</label>
                <input type="date" name="start_date" class="input input-sm w-full" value="{{ obj.start_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Completion Date" %}</label>
                <input type="date" name="completion_date" class="input input-sm w-full" value="{{ obj.completion_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Score" %}</label>
                <input type="number" name="score" class="input input-sm w-full" step="0.01" value="{{ obj.score }}">
                </div>
            </div>
        </div>
    </form>
</div>
